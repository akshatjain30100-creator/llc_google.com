<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Workspace Pro Dashboard</title>
    
    <!-- Tailwind CSS Engine Via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Material Design Icons Layer -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Custom Tailwind Configuration Overrides -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        workspaceBg: '#121214',
                        sidebarBg: '#1e1e24',
                        cardBg: '#1a1a22'
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbars inside workspace navigation layout structures */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-workspaceBg text-white overflow-hidden h-screen w-screen flex font-sans antialiased">

    <!-- ⏳ TOP PROGRESS TRACK BAR (DYNAMIC CLIENT-SIDE RENDER ANIMATION) -->
    <div id="topProgressBar" class="fixed top-0 left-0 h-[3px] bg-blue-600 z-[9999] w-0 transition-all duration-300 ease-out"></div>

    <!-- 📱 RESPONSIVE MOBILE BAR -->
    <div class="md:hidden fixed top-0 left-0 right-0 h-16 bg-sidebarBg border-b border-white/5 flex items-center px-4 z-40">
        <button onclick="toggleMobileSidebar()" class="text-white mr-4 p-1 rounded-lg hover:bg-white/5 active:scale-95 transition-transform">
            <i class="material-icons text-2xl">menu</i>
        </button>
        <h1 id="mobileHeaderTitle" class="text-md font-semibold tracking-wide text-zinc-100">Workspace Home</h1>
    </div>

    <!-- 🌫️ MOBILE SIDEBAR BACKDROP SCREEN OVERLAY -->
    <div id="sidebarOverlay" onclick="toggleMobileSidebar()" class="hidden md:hidden fixed inset-0 bg-black/60 z-40 backdrop-blur-sm transition-opacity"></div>

    <!-- 🧭 ADAPTIVE DRAWER & SIDEBAR WORKSPACE NAVIGATION -->
    <aside id="sidebarPanel" class="fixed md:static inset-y-0 left-0 w-[275px] bg-sidebarBg border-r border-white/5 flex flex-col z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        
        <!-- Corporate Identity Header -->
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="material-icons text-blue-500 animate-pulse text-3xl">layers</i>
                <span class="text-lg font-bold tracking-wider bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">
                    Workspace Pro
                </span>
            </div>
            <!-- Mobile dismiss button toggle control -->
            <button onclick="toggleMobileSidebar()" class="md:hidden text-zinc-400 hover:text-white p-1 rounded-lg">
                <i class="material-icons">close</i>
            </button>
        </div>

        <!-- CSR Dynamic UI Render Injector Point -->
        <nav id="navigationContainer" class="flex-1 py-4 overflow-y-auto space-y-1 no-scrollbar"></nav>
    </aside>

    <!-- 🖥️ MAIN ECOSYSTEM CONTAINER (DASHBOARD ENGINE) -->
    <main class="flex-1 flex flex-col h-full bg-black relative pt-16 md:pt-0">
        
        <!-- Welcome Dashboard Screen (Default State to handle security fallbacks gracefully) -->
        <div id="welcomeDashboard" class="absolute inset-0 z-10 flex flex-col items-center justify-center p-6 text-center bg-workspaceBg overflow-y-auto no-scrollbar">
            <div class="max-w-3xl w-full">
                <h2 class="text-3xl md:text-4xl font-extrabold text-white mb-2">Welcome to Your Google Hub</h2>
                <p class="text-zinc-400 mb-8 max-w-md mx-auto text-sm md:text-base">Select any tool from the sidebar or jump directly using the actions below.</p>
                
                <!-- Quick Launch Grid Layout -->
                <div id="dashboardGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    <!-- Dynamic Cards will be injected via JS -->
                </div>
            </div>
        </div>

        <!-- Dynamic Frame Node Container for Target Tools -->
        <iframe
            id="workspaceFrame"
            src="about:blank"
            class="w-full h-full border-none bg-white hidden"
            allow="geolocation; microphone; camera; encrypted-media;"
            sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"
        ></iframe>
    </main>

    <!-- ⚙️ COMPACT JS STATE MACHINE CONTROL HANDLING ACTIONS -->
    <script>
        // Core Mappings Matrix Data Arrays with specialized embed/fallback routes
        const googleServices = [
            { name: 'Workspace Home', url: 'home', icon: 'dashboard', color: 'text-zinc-400' },
            { name: 'Google Search', url: 'https://www.google.com/webhp?igu=1', icon: 'search', color: 'text-blue-500' },
            { name: 'YouTube', url: 'https://www.youtube.com/embed/', icon: 'video_library', fallback: 'https://www.youtube.com', color: 'text-red-500' },
            { name: 'Google Drive', url: 'https://drive.google.com', icon: 'cloud_queue', targetBlank: true, color: 'text-yellow-500' },
            { name: 'Gmail', url: 'https://mail.google.com', icon: 'email_outlined', targetBlank: true, color: 'text-red-400' },
            { name: 'Google Maps', url: 'https://maps.google.com/maps?output=embed', fallback: 'https://maps.google.com', icon: 'map_outlined', color: 'text-green-500' },
            { name: 'Google Calendar', url: 'https://calendar.google.com', icon: 'calendar_month', targetBlank: true, color: 'text-blue-400' }
        ];

        let selectedIndex = 0;
        let progressInterval;

        // Render Client-Side Navigation Panels dynamically
        function renderNavigation() {
            const container = document.getElementById('navigationContainer');
            container.innerHTML = '';

            googleServices.forEach((service, index) => {
                const isSelected = index === selectedIndex;
                
                const btnContainer = document.createElement('div');
                btnContainer.className = 'px-3';

                const button = document.createElement('button');
                button.onclick = () => handleServiceSelect(index);
                button.className = `w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all duration-200 group ${
                    isSelected 
                    ? 'bg-blue-600/10 text-blue-400 font-semibold border-l-4 border-blue-500 pl-3' 
                    : 'text-zinc-400 hover:bg-white/5 hover:text-zinc-100'
                }`;

                button.innerHTML = `
                    <i class="material-icons transition-colors duration-200 ${isSelected ? 'text-blue-500' : 'text-zinc-400 group-hover:text-zinc-200'}">${service.icon}</i>
                    <span class="text-[14.5px] tracking-wide">${service.name}</span>
                `;

                btnContainer.appendChild(button);
                container.appendChild(btnContainer);
            });
        }

        // Generate Central Dashboard Interface Grid Items
        function buildDashboardGrid() {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '';

            // Render all items except index 0 (Home itself)
            googleServices.forEach((service, index) => {
                if (index === 0) return;

                const card = document.createElement('div');
                card.className = 'bg-cardBg border border-white/5 p-5 rounded-2xl flex flex-col items-center justify-center gap-3 cursor-pointer hover:border-blue-500/50 hover:bg-white/[0.02] transition-all duration-300 group shadow-lg';
                card.onclick = () => handleServiceSelect(index);

                card.innerHTML = `
                    <div class="p-3 bg-white/5 rounded-xl group-hover:scale-110 transition-transform duration-300">
                        <i class="material-icons text-3xl ${service.color}">${service.icon}</i>
                    </div>
                    <span class="text-sm font-medium tracking-wide text-zinc-200">${service.name}</span>
                `;
                grid.appendChild(card);
            });
        }

        // Route action transitions manager
        function handleServiceSelect(index) {
            selectedIndex = index;
            renderNavigation();

            const iframe = document.getElementById('workspaceFrame');
            const welcomeDashboard = document.getElementById('welcomeDashboard');
            const progressBar = document.getElementById('topProgressBar');
            
            document.getElementById('mobileHeaderTitle').innerText = googleServices[index].name;

            // Handle External Target Safetynets (For Tools completely blocked by X-Frame headers like Gmail/Drive)
            if (googleServices[index].targetBlank) {
                window.open(googleServices[index].url, '_blank');
                // Return navigation focus automatically to Home dashboard
                handleServiceSelect(0);
                return;
            }

            // Trigger progress bar mock transitions
            clearInterval(progressInterval);
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            
            let currentWidth = 0;
            setTimeout(() => {
                progressBar.style.transition = 'width 0.4s ease-out';
                currentWidth = 20;
                progressBar.style.width = `${currentWidth}%`;

                progressInterval = setInterval(() => {
                    if (currentWidth < 85) {
                        currentWidth += 15;
                        progressBar.style.width = `${currentWidth}%`;
                    }
                }, 100);
            }, 50);

            // Handle Home vs Iframe View states switcher
            if (googleServices[index].url === 'home') {
                iframe.classList.add('hidden');
                welcomeDashboard.classList.remove('hidden');
                iframe.src = "about:blank";
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                setTimeout(() => progressBar.style.width = '0%', 300);
            } else {
                welcomeDashboard.classList.add('hidden');
                iframe.classList.remove('hidden');
                iframe.src = googleServices[index].url;
            }

            // Close responsive side drawers views on action
            const sidebarPanel = document.getElementById('sidebarPanel');
            if (!sidebarPanel.classList.contains('-translate-x-full')) {
                toggleMobileSidebar();
            }
        }

        // Frame loader reset bindings
        document.getElementById('workspaceFrame').onload = function() {
            clearInterval(progressInterval);
            const progressBar = document.getElementById('topProgressBar');
            if (this.src !== "about:blank") {
                progressBar.style.width = '100%';
                setTimeout(() => {
                    progressBar.style.width = '0%';
                    progressBar.style.transition = 'none';
                }, 300);
            }
        };

        // Mobile layout sidebar visibility handler
        function toggleMobileSidebar() {
            const panel = document.getElementById('sidebarPanel');
            const overlay = document.getElementById('sidebarOverlay');
            panel.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // Initialize App Runtime Hooks
        window.onload = function() {
            renderNavigation();
            buildDashboardGrid();
        };
    </script>
</body>
</html>
