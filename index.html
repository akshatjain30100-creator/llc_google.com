<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Workspace Pro Dashboard</title>
    
    <!-- Tailwind CSS Engine Via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind Configuration Overrides -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        workspaceBg: '#121214',
                        sidebarBg: '#1e1e24',
                        cardBg: '#1a1a22'
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbars inside workspace navigation layout structures */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scrolling-touch { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-workspaceBg text-white overflow-hidden h-screen w-screen flex font-sans antialiased select-none">

    <!-- ⏳ TOP PROGRESS TRACK BAR (DYNAMIC CLIENT-SIDE RENDER ANIMATION) -->
    <div id="topProgressBar" class="fixed top-0 left-0 h-[3px] bg-blue-600 z-[9999] w-0 transition-all duration-300 ease-out"></div>

    <!-- 📱 RESPONSIVE MOBILE BAR -->
    <div class="md:hidden fixed top-0 left-0 right-0 h-16 bg-sidebarBg border-b border-white/5 flex items-center px-4 z-40">
        <button onclick="toggleMobileSidebar()" class="text-white mr-4 p-1 rounded-lg hover:bg-white/5 active:scale-95 transition-transform">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 id="mobileHeaderTitle" class="text-md font-semibold tracking-wide text-zinc-100">Workspace Home</h1>
    </div>

    <!-- 🌫️ MOBILE SIDEBAR BACKDROP SCREEN OVERLAY -->
    <div id="sidebarOverlay" onclick="toggleMobileSidebar()" class="hidden md:hidden fixed inset-0 bg-black/60 z-40 backdrop-blur-sm transition-opacity"></div>

    <!-- 🧭 ADAPTIVE DRAWER & SIDEBAR WORKSPACE NAVIGATION -->
    <aside id="sidebarPanel" class="fixed md:static inset-y-0 left-0 w-[275px] bg-sidebarBg border-r border-white/5 flex flex-col z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        
        <!-- Corporate Identity Header -->
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-7 h-7 text-blue-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                <span class="text-lg font-bold tracking-wider bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">
                    Workspace Pro
                </span>
            </div>
            <button onclick="toggleMobileSidebar()" class="md:hidden text-zinc-400 hover:text-white p-1 rounded-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- CSR Dynamic UI Render Injector Point -->
        <nav id="navigationContainer" class="flex-1 py-4 overflow-y-auto space-y-1 no-scrollbar scrolling-touch"></nav>
    </aside>

    <!-- 🖥️ MAIN ECOSYSTEM CONTAINER (DASHBOARD ENGINE) -->
    <main class="flex-1 flex flex-col h-full bg-black relative pt-16 md:pt-0 overflow-hidden">
        
        <!-- Welcome Dashboard Screen -->
        <div id="welcomeDashboard" class="absolute inset-0 z-10 flex flex-col items-center justify-start md:justify-center p-6 text-center bg-workspaceBg overflow-y-auto no-scrollbar scrolling-touch">
            <div class="max-w-5xl w-full py-6">
                <h2 class="text-3xl md:text-4xl font-extrabold text-white mb-2">Welcome to Your Google Hub</h2>
                <p class="text-zinc-400 mb-8 max-w-md mx-auto text-sm md:text-base">Select any tool from the sidebar or jump directly using the actions below.</p>
                
                <!-- Expanded Responsive Grid Layout -->
                <div id="dashboardGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 pb-12 md:pb-0">
                    <!-- Dynamic Cards injected via JS -->
                </div>
            </div>
        </div>

        <!-- Dynamic Frame Container Node -->
        <div id="iframeWrapper" class="w-full h-[calc(100vh-4rem)] md:h-full overflow-auto scrolling-touch hidden">
            <iframe
                id="workspaceFrame"
                src="about:blank"
                class="w-full h-full border-none bg-white"
                allow="geolocation; microphone; camera; encrypted-media; autoplay;"
                sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"
            ></iframe>
        </div>
    </main>

    <!-- ⚙️ CONTROL MECHANISM SCRIPTS -->
    <script>
        const svgIcons = {
            dashboard: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>`,
            search: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>`,
            video: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>`,
            gemini: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>`,
            notebook: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>`,
            ads: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/></svg>`,
            drive: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5 5 0 00-4.591-3.441 5 5 0 00-4.746 3.445 1 1 0 01-1 1A4 4 0 003 15z"/></svg>`,
            gmail: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>`,
            maps: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>`,
            calendar: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`,
            docs: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>`,
            sheets: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18M12 3v18M6 3v18M18 3v18M3 5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5z"/></svg>`,
            slides: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h18M3 16h18M4 5h16a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V6a1 1 0 011-1z"/></svg>`,
            photos: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`,
            keep: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>`
        };

        const googleServices = [
            { name: 'Workspace Home', url: 'home', icon: 'dashboard', color: 'text-zinc-400', embeddable: true },
            { name: 'Google Search', url: 'https://www.google.com/webhp?igu=1', icon: 'search', color: 'text-blue-500', embeddable: true },
            { name: 'Google Maps', url: 'https://maps.google.com/maps?output=embed&q=India', icon: 'maps', color: 'text-green-500', embeddable: true },
            { name: 'YouTube', url: 'https://www.youtube.com/embed?listType=search&list=trending', icon: 'video', color: 'text-red-500', embeddable: true },
            { name: 'Gemini AI', url: 'https://gemini.google.com', icon: 'gemini', color: 'text-purple-400', embeddable: false },
            { name: 'NotebookLM', url: 'https://notebooklm.google.com', icon: 'notebook', color: 'text-cyan-400', embeddable: false },
            { name: 'Google Ads', url: 'https://ads.google.com/ups/routing?source=206&subid=xs-ip-gemini-adlt', icon: 'ads', color: 'text-amber-500', embeddable: false },
            { name: 'Google Docs', url: 'https://docs.google.com', icon: 'docs', color: 'text-blue-400', embeddable: false },
            { name: 'Google Sheets', url: 'https://sheets.google.com', icon: 'sheets', color: 'text-green-400', embeddable: false },
            { name: 'Google Slides', url: 'https://slides.google.com', icon: 'slides', color: 'text-yellow-600', embeddable: false },
            { name: 'Google Photos', url: 'https://photos.google.com', icon: 'photos', color: 'text-indigo-400', embeddable: false },
            { name: 'Google Keep', url: 'https://keep.google.com', icon: 'keep', color: 'text-amber-400', embeddable: false },
            { name: 'Google Drive', url: 'https://drive.google.com', icon: 'drive', color: 'text-yellow-500', embeddable: false },
            { name: 'Gmail', url: 'https://mail.google.com', icon: 'gmail', color: 'text-red-400', embeddable: false },
            { name: 'Google Calendar', url: 'https://calendar.google.com', icon: 'calendar', color: 'text-blue-400', embeddable: false }
        ];

        let selectedIndex = 0;
        let progressInterval;

        function renderNavigation() {
            const container = document.getElementById('navigationContainer');
            container.innerHTML = '';

            googleServices.forEach((service, index) => {
                const isSelected = index === selectedIndex;
                
                const btnContainer = document.createElement('div');
                btnContainer.className = 'px-3';

                const button = document.createElement('button');
                button.onclick = () => handleServiceSelect(index);
                button.className = `w-full flex items-center gap-4 px-4 py-2.5 rounded-xl transition-all duration-200 group ${
                    isSelected 
                    ? 'bg-blue-600/10 text-blue-400 font-semibold border-l-4 border-blue-500 pl-3' 
                    : 'text-zinc-400 hover:bg-white/5 hover:text-zinc-100'
                }`;

                button.innerHTML = `
                    <div class="transition-colors duration-200 ${isSelected ? 'text-blue-500' : 'text-zinc-400 group-hover:text-zinc-200'}">
                        ${svgIcons[service.icon]}
                    </div>
                    <span class="text-[14px] tracking-wide">${service.name}</span>
                `;

                btnContainer.appendChild(button);
                container.appendChild(btnContainer);
            });
        }

        function buildDashboardGrid() {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '';

            googleServices.forEach((service, index) => {
                if (index === 0) return;

                const card = document.createElement('div');
                card.className = 'bg-cardBg border border-white/5 p-5 rounded-2xl flex flex-col items-center justify-center gap-3 cursor-pointer hover:border-blue-500/50 hover:bg-white/[0.02] transition-all duration-300 group shadow-lg';
                card.onclick = () => handleServiceSelect(index);

                card.innerHTML = `
                    <div class="p-3 bg-white/5 rounded-xl group-hover:scale-110 transition-transform duration-300 ${service.color}">
                        ${svgIcons[service.icon]}
                    </div>
                    <span class="text-xs font-medium tracking-wide text-zinc-200 text-center">${service.name}</span>
                `;
                grid.appendChild(card);
            });
        }

        function handleServiceSelect(index) {
            const service = googleServices[index];

            // If the service is NOT embeddable, open in New Tab safely
            if (!service.embeddable) {
                window.open(service.url, '_blank');
                return; 
            }

            selectedIndex = index;
            renderNavigation();

            const iframe = document.getElementById('workspaceFrame');
            const iframeWrapper = document.getElementById('iframeWrapper');
            const welcomeDashboard = document.getElementById('welcomeDashboard');
            const progressBar = document.getElementById('topProgressBar');
            
            document.getElementById('mobileHeaderTitle').innerText = service.name;

            // Progress Bar Animation Loader
            clearInterval(progressInterval);
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            
            let currentWidth = 0;
            setTimeout(() => {
                progressBar.style.transition = 'width 0.4s ease-out';
                currentWidth = 20;
                progressBar.style.width = `${currentWidth}%`;

                progressInterval = setInterval(() => {
                    if (currentWidth < 85) {
                        currentWidth += 15;
                        progressBar.style.width = `${currentWidth}%`;
                    }
                }, 100);
            }, 50);

            // Routing Layout View Switcher
            if (service.url === 'home') {
                iframeWrapper.classList.add('hidden');
                welcomeDashboard.classList.remove('hidden');
                iframe.src = "about:blank";
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                setTimeout(() => progressBar.style.width = '0%', 300);
            } else {
                welcomeDashboard.classList.add('hidden');
                iframeWrapper.classList.remove('hidden');
                iframe.src = service.url;
            }

            // Auto Close Mobile Sidebar Drawer
            const sidebarPanel = document.getElementById('sidebarPanel');
            if (!sidebarPanel.classList.contains('-translate-x-full')) {
                toggleMobileSidebar();
            }
        }

        function resetToHomeState() {
            selectedIndex = 0;
            renderNavigation();
            document.getElementById('mobileHeaderTitle').innerText = googleServices[0].name;
            document.getElementById('iframeWrapper').classList.add('hidden');
            document.getElementById('welcomeDashboard').classList.remove('hidden');
            document.getElementById('workspaceFrame').src = "about:blank";
        }

        document.getElementById('workspaceFrame').onload = function() {
            clearInterval(progressInterval);
            const progressBar = document.getElementById('topProgressBar');
            if (this.src !== "about:blank") {
                progressBar.style.width = '100%';
                setTimeout(() => {
                    progressBar.style.width = '0%';
                    progressBar.style.transition = 'none';
                }, 300);
            }
        };

        function toggleMobileSidebar() {
            const panel = document.getElementById('sidebarPanel');
            const overlay = document.getElementById('sidebarOverlay');
            panel.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        window.onload = function() {
            resetToHomeState();
            buildDashboardGrid();
        };
    </script>
</body>
</html>
