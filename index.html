<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Workspace Pro Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        workspaceBg: { dark: '#121214', light: '#f4f5f7' },
                        sidebarBg: { dark: '#1e1e24', light: '#ffffff' },
                        cardBg: { dark: '#1a1a22', light: '#ffffff' }
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scrolling-touch { -webkit-overflow-scrolling: touch; }
        
        .dragging {
            opacity: 0.4;
            transform: scale(0.95);
            border-color: #2563eb !important;
        }
    </style>
</head>
<body class="bg-workspaceBg-light dark:bg-workspaceBg-dark text-zinc-800 dark:text-white overflow-hidden h-screen w-screen flex font-sans antialiased select-none transition-colors duration-200">

    <div id="topProgressBar" class="fixed top-0 left-0 h-[3px] bg-blue-600 z-[9999] w-0 transition-all duration-300 ease-out"></div>

    <div id="infoModalOverlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[999] flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div id="infoModalBox" class="bg-white dark:bg-zinc-900 border border-black/10 dark:border-white/10 w-full max-w-4xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-all duration-300">
            <div class="p-6 border-b border-black/5 dark:border-white/5 flex items-center justify-between bg-zinc-50 dark:bg-zinc-900/50">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-600/10 text-blue-600 dark:text-blue-400 rounded-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-zinc-900 dark:text-white">Workspace Ecosystem Directory</h3>
                        <p class="text-xs text-zinc-500 dark:text-zinc-400">Comprehensive summary of all optimized Google web application capabilities</p>
                    </div>
                </div>
                <button onclick="closeInfoModal()" class="p-2 rounded-xl hover:bg-black/5 dark:hover:bg-white/5 text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-white transition-colors cursor-pointer">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="infoModalContent" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-4 no-scrollbar scrolling-touch bg-white dark:bg-zinc-900">
                </div>
        </div>
    </div>

    <div class="md:hidden fixed top-0 left-0 right-0 h-16 bg-sidebarBg-light dark:bg-sidebarBg-dark border-b border-black/5 dark:border-white/5 flex items-center justify-between px-4 z-40 transition-colors duration-200">
        <div class="flex items-center">
            <button onclick="toggleMobileSidebar()" class="text-zinc-700 dark:text-white mr-3 p-1 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 active:scale-95 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <button onclick="openInfoModal()" class="text-blue-600 dark:text-blue-400 p-1.5 rounded-lg bg-blue-600/10 hover:scale-105 transition-transform mr-3" title="Ecosystem Info">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </button>
            <h1 id="mobileHeaderTitle" class="text-md font-semibold tracking-wide text-zinc-800 dark:text-zinc-100">Workspace Home</h1>
        </div>
        
        <button onclick="toggleTheme()" class="p-2 rounded-xl bg-black/5 dark:bg-white/5 text-zinc-700 dark:text-amber-400 hover:scale-105 transition-all">
            <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
        </button>
    </div>

    <div id="sidebarOverlay" onclick="toggleMobileSidebar()" class="hidden md:hidden fixed inset-0 bg-black/60 z-40 backdrop-blur-sm transition-opacity"></div>

    <aside id="sidebarPanel" class="fixed md:static inset-y-0 left-0 w-[275px] bg-sidebarBg-light dark:bg-sidebarBg-dark border-r border-black/5 dark:border-white/5 flex flex-col z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out transition-colors duration-200">
        <div class="p-6 border-b border-black/5 dark:border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="openInfoModal()" class="text-blue-600 dark:text-blue-400 p-2 rounded-xl bg-blue-600/10 hover:bg-blue-600/20 active:scale-95 transition-all cursor-pointer shadow-sm" title="Application Information System">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </button>
                <span class="text-lg font-bold tracking-wider bg-gradient-to-r from-zinc-900 to-zinc-600 dark:from-white dark:to-zinc-400 bg-clip-text text-transparent">Workspace Pro</span>
            </div>
            
            <div class="flex items-center gap-1">
                <button onclick="toggleTheme()" class="hidden md:flex p-2 rounded-xl hover:bg-black/5 dark:hover:bg-white/5 text-zinc-600 dark:text-amber-400 transition-all cursor-pointer" title="Toggle Light/Dark Mode">
                    <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
                </button>
                <button onclick="toggleMobileSidebar()" class="md:hidden text-zinc-500 dark:text-zinc-400 hover:text-black dark:hover:text-white p-1 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <nav id="navigationContainer" class="flex-1 py-4 overflow-y-auto space-y-1 no-scrollbar scrolling-touch"></nav>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-slate-100 dark:bg-black relative pt-16 md:pt-0 overflow-hidden transition-colors duration-200">
        <div id="welcomeDashboard" class="absolute inset-0 z-10 flex flex-col items-center justify-start p-6 text-center bg-workspaceBg-light dark:bg-workspaceBg-dark overflow-y-auto no-scrollbar scrolling-touch transition-colors duration-200">
            <div class="max-w-7xl w-full py-6">
                <h2 class="text-3xl md:text-4xl font-extrabold text-zinc-900 dark:text-white mb-2">Welcome to Your Google Hub</h2>
                <p class="text-zinc-500 dark:text-zinc-400 mb-2 max-w-md mx-auto text-sm md:text-base">Click the information icon at the top-left to inspect applications data matrices or drag cards to reorder layout sequence.</p>
                
                <button onclick="resetOrderToDefault()" class="mb-8 text-xs text-blue-600 dark:text-blue-500 hover:underline cursor-pointer transition-colors">Reset Layout Order</button>
                
                <div id="dashboardGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 pb-12"></div>
            </div>
        </div>

        <div id="iframeWrapper" class="w-full h-[calc(100vh-4rem)] md:h-full overflow-auto scrolling-touch hidden">
            <iframe
                id="workspaceFrame"
                src="about:blank"
                class="w-full h-full border-none bg-white"
                allow="geolocation; microphone; camera; encrypted-media; autoplay; clipboard-write; gyroscope; picture-in-picture;"
                allowfullscreen
            ></iframe>
        </div>
    </main>

            { id: 'calendar', name: 'Google Calendar', url: 'https://calendar.google.com', icon: 'calendar', color: 'text-blue-500 dark:text-blue-400', embeddable: false, desc: 'Time coordination schedule registry managing invitations, resource logs, and scheduling vectors.' }
        ];

        let googleServices = JSON.parse(localStorage.getItem('workspace_pro_order')) || [...defaultServices];
        let selectedIndex = 0;
        let progressInterval;

        // --- ℹ️ ECOSYSTEM INFORMATION DIRECTORY MODAL LOGIC ---
        function generateInfoDirectory() {
            const contentArea = document.getElementById('infoModalContent');
            contentArea.innerHTML = '';

            googleServices.forEach(service => {
                const row = document.createElement('div');
                row.className = 'p-4 bg-zinc-50 dark:bg-zinc-800/40 border border-black/5 dark:border-white/5 rounded-2xl flex gap-4 items-start';

                row.innerHTML = `
                    <div class="p-3 bg-white dark:bg-zinc-900 rounded-xl shadow-sm flex-shrink-0 ${service.color}">
                        ${svgIcons[service.icon] || svgIcons.dashboard}
                    </div>
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <h4 class="font-bold text-sm text-zinc-900 dark:text-white">${service.name}</h4>
                            <span class="text-[10px] px-2 py-0.5 rounded-full font-semibold ${service.embeddable ? 'bg-blue-600/10 text-blue-500' : 'bg-amber-600/10 text-amber-500'}">
                                ${service.embeddable ? 'Portal Hub' : 'External'}
                            </span>
                        </div>
                        <p class="text-xs text-zinc-600 dark:text-zinc-400 leading-relaxed">${service.desc || 'No supplementary data compiled for this integration block element nodes.'}</p>
                    </div>
                `;
                contentArea.appendChild(row);
            });
        }

        function openInfoModal() {
            generateInfoDirectory();
            const modalOverlay = document.getElementById('infoModalOverlay');
            const modalBox = document.getElementById('infoModalBox');
            
            modalOverlay.classList.remove('hidden');
            setTimeout(() => {
                modalOverlay.classList.add('opacity-100');
                modalBox.classList.remove('scale-95');
                modalBox.classList.add('scale-100');
            }, 10);
        }

        function closeInfoModal() {
            const modalOverlay = document.getElementById('infoModalOverlay');
            const modalBox = document.getElementById('infoModalBox');
            
            modalOverlay.classList.remove('opacity-100');
            modalBox.classList.remove('scale-100');
            modalBox.classList.add('scale-95');
            setTimeout(() => modalOverlay.classList.add('hidden'), 300);
        }

        // --- 🌗 CORE THEME MANAGEMENT SYSTEM ---
        function initThemeEngine() {
            const cachedTheme = localStorage.getItem('workspace_theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (cachedTheme === 'dark' || (!cachedTheme && systemPrefersDark)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('workspace_theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('workspace_theme', 'dark');
            }
        }

        // --- 🧭 NAVIGATION & GRID LIST RENDERING ---
        function renderNavigation() {
            const container = document.getElementById('navigationContainer');
            container.innerHTML = '';

            googleServices.forEach((service, index) => {
                const isSelected = index === selectedIndex;
                const btnContainer = document.createElement('div');
                btnContainer.className = 'px-3';

                const button = document.createElement('button');
                button.onclick = () => handleServiceSelect(index);
                button.className = `w-full flex items-center gap-4 px-4 py-2.5 rounded-xl transition-all duration-200 group ${
                    isSelected 
                    ? 'bg-blue-600/10 text-blue-600 dark:text-blue-400 font-semibold border-l-4 border-blue-500 pl-3' 
                    : 'text-zinc-500 dark:text-zinc-400 hover:bg-black/5 dark:hover:bg-white/5 hover:text-zinc-900 dark:hover:text-zinc-100'
                }`;

                button.innerHTML = `
                    <div class="transition-colors duration-200 ${isSelected ? 'text-blue-500' : 'text-zinc-400 group-hover:text-zinc-600 dark:group-hover:text-zinc-200'}">
                        ${svgIcons[service.icon] || svgIcons.dashboard}
                    </div>
                    <span class="text-[14px] tracking-wide text-left">${service.name}</span>
                `;
                btnContainer.appendChild(button);
                container.appendChild(btnContainer);
            });
        }

        function buildDashboardGrid() {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '';

            googleServices.forEach((service, index) => {
                if (service.id === 'home') return;

                const card = document.createElement('div');
                card.setAttribute('draggable', 'true');
                card.setAttribute('data-id', service.id);
                card.className = 'bg-sidebarBg-light dark:bg-cardBg-dark border border-black/5 dark:border-white/5 p-5 rounded-2xl flex flex-col items-center justify-center gap-3 cursor-grab active:cursor-grabbing hover:border-blue-500/40 dark:hover:border-blue-500/50 hover:shadow-md dark:hover:bg-white/[0.02] transition-all duration-300 group shadow-sm select-none';
                
                card.onclick = () => {
                    if(card.classList.contains('dragging')) return;
                    handleServiceSelect(index);
                };

                card.addEventListener('dragstart', () => card.classList.add('dragging'));
                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    saveNewOrderState();
                });

                card.innerHTML = `
                    <div class="p-3 bg-black/5 dark:bg-white/5 rounded-xl group-hover:scale-110 transition-transform duration-300 ${service.color} pointer-events-none">
                        ${svgIcons[service.icon] || svgIcons.dashboard}
                    </div>
                    <span class="text-xs font-medium tracking-wide text-zinc-700 dark:text-zinc-200 text-center pointer-events-none">${service.name}</span>
                `;
                grid.appendChild(card);
            });

            initDragAndDropSorting();
        }

        function initDragAndDropSorting() {
            const grid = document.getElementById('dashboardGrid');
            
            grid.addEventListener('dragover', (e) => {
                e.preventDefault();
                const draggingCard = document.querySelector('.dragging');
                if(!draggingCard) return;

                const siblings = [...grid.querySelectorAll('[draggable="true"]:not(.dragging)')];
                
                let nextSibling = siblings.find(sibling => {
                    const box = sibling.getBoundingClientRect();
                    const offset = e.clientY - box.top - box.height / 2;
                    const offsetHorizontal = e.clientX - box.left - box.width / 2;
                    return offset < 0 || offsetHorizontal < 0;
                });

                if(!nextSibling) {
                    grid.appendChild(draggingCard);
                } else {
                    grid.insertBefore(draggingCard, nextSibling);
                }
            });
        }

        function saveNewOrderState() {
            const grid = document.getElementById('dashboardGrid');
            const currentCards = [...grid.querySelectorAll('[draggable="true"]')];
            
            let sortedServices = [];
            const homeService = defaultServices.find(s => s.id === 'home');
            sortedServices.push(homeService);

            currentCards.forEach(card => {
                const serviceId = card.getAttribute('data-id');
                const matchedService = googleServices.find(s => s.id === serviceId);
                if(matchedService) sortedServices.push(matchedService);
            });

            googleServices = sortedServices;
            localStorage.setItem('workspace_pro_order', JSON.stringify(googleServices));
            renderNavigation();
        }

        function resetOrderToDefault() {
            localStorage.removeItem('workspace_pro_order');
            googleServices = [...defaultServices];
            buildDashboardGrid();
            renderNavigation();
        }

        function handleServiceSelect(index) {
            const service = googleServices[index];

            if (!service.embeddable) {
                window.open(service.url, '_blank');
                return; 
            }

            selectedIndex = index;
            renderNavigation();

            const iframe = document.getElementById('workspaceFrame');
            const iframeWrapper = document.getElementById('iframeWrapper');
            const welcomeDashboard = document.getElementById('welcomeDashboard');
            const progressBar = document.getElementById('topProgressBar');
            
            document.getElementById('mobileHeaderTitle').innerText = service.name;

            clearInterval(progressInterval);
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            
            let currentWidth = 0;
            setTimeout(() => {
                progressBar.style.transition = 'width 0.4s ease-out';
                currentWidth = 20;
                progressBar.style.width = `${currentWidth}%`;

                progressInterval = setInterval(() => {
                    if (currentWidth < 85) {
                        currentWidth += 15;
                        progressBar.style.width = `${currentWidth}%`;
                    }
                }, 100);
            }, 50);

            if (service.url === 'home') {
                iframeWrapper.classList.add('hidden');
                welcomeDashboard.classList.remove('hidden');
                iframe.src = "about:blank";
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                setTimeout(() => progressBar.style.width = '0%', 300);
            } else {
                welcomeDashboard.classList.add('hidden');
                iframeWrapper.classList.remove('hidden');
                iframe.src = service.url;
            }

            const sidebarPanel = document.getElementById('sidebarPanel');
            if (!sidebarPanel.classList.contains('-translate-x-full')) {
                toggleMobileSidebar();
            }
        }

        function resetToHomeState() {
            selectedIndex = 0;
            renderNavigation();
            document.getElementById('mobileHeaderTitle').innerText = googleServices[0].name;
            document.getElementById('iframeWrapper').classList.add('hidden');
            document.getElementById('welcomeDashboard').classList.remove('hidden');
            document.getElementById('workspaceFrame').src = "about:blank";
        }

        document.getElementById('workspaceFrame').onload = function() {
            clearInterval(progressInterval);
            const progressBar = document.getElementById('topProgressBar');
            if (this.src !== "about:blank") {
                progressBar.style.width = '100%';
                setTimeout(() => {
                    progressBar.style.width = '0%';
                    progressBar.style.transition = 'none';
                }, 300);
            }
        };

        function toggleMobileSidebar() {
            const panel = document.getElementById('sidebarPanel');
            const overlay = document.getElementById('sidebarOverlay');
            panel.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // Close modal when user clicks outside the modal box container card background
        window.onclick = function(event) {
            const modalOverlay = document.getElementById('infoModalOverlay');
            if (event.target === modalOverlay) {
                closeInfoModal();
            }
        }

        window.onload = function() {
            initThemeEngine();
            resetToHomeState();
            buildDashboardGrid();
        };
    </script>
