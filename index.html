<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Workspace Pro Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        workspaceBg: '#121214',
                        sidebarBg: '#1e1e24',
                        cardBg: '#1a1a22'
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scrolling-touch { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-workspaceBg text-white overflow-hidden h-screen w-screen flex font-sans antialiased select-none">

    <div id="topProgressBar" class="fixed top-0 left-0 h-[3px] bg-blue-600 z-[9999] w-0 transition-all duration-300 ease-out"></div>

    <div class="md:hidden fixed top-0 left-0 right-0 h-16 bg-sidebarBg border-b border-white/5 flex items-center px-4 z-40">
        <button onclick="toggleMobileSidebar()" class="text-white mr-4 p-1 rounded-lg hover:bg-white/5 active:scale-95 transition-transform">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 id="mobileHeaderTitle" class="text-md font-semibold tracking-wide text-zinc-100">Workspace Home</h1>
    </div>

    <div id="sidebarOverlay" onclick="toggleMobileSidebar()" class="hidden md:hidden fixed inset-0 bg-black/60 z-40 backdrop-blur-sm transition-opacity"></div>

    <aside id="sidebarPanel" class="fixed md:static inset-y-0 left-0 w-[275px] bg-sidebarBg border-r border-white/5 flex flex-col z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-7 h-7 text-blue-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                <span class="text-lg font-bold tracking-wider bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">Workspace Pro</span>
            </div>
            <button onclick="toggleMobileSidebar()" class="md:hidden text-zinc-400 hover:text-white p-1 rounded-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <nav id="navigationContainer" class="flex-1 py-4 overflow-y-auto space-y-1 no-scrollbar scrolling-touch"></nav>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-black relative pt-16 md:pt-0 overflow-hidden">
        <div id="welcomeDashboard" class="absolute inset-0 z-10 flex flex-col items-center justify-start p-6 text-center bg-workspaceBg overflow-y-auto no-scrollbar scrolling-touch">
            <div class="max-w-7xl w-full py-6">
                <h2 class="text-3xl md:text-4xl font-extrabold text-white mb-2">Welcome to Your Google Hub</h2>
                <p class="text-zinc-400 mb-8 max-w-md mx-auto text-sm md:text-base">Select any tool from the sidebar or jump directly using the actions below.</p>
                <div id="dashboardGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 pb-12"></div>
            </div>
        </div>

        <div id="iframeWrapper" class="w-full h-[calc(100vh-4rem)] md:h-full overflow-auto scrolling-touch hidden">
            <iframe
                id="workspaceFrame"
                src="about:blank"
                class="w-full h-full border-none bg-white"
                allow="geolocation; microphone; camera; encrypted-media; autoplay; clipboard-write; gyroscope; picture-in-picture;"
                allowfullscreen
            ></iframe>
        </div>
    </main>

            { name: 'Google Shopping', url: 'https://shopping.google.com', icon: 'shopping', color: 'text-amber-600', embeddable: false },
            { name: 'Google Earth', url: 'https://earth.google.com', icon: 'earth', color: 'text-blue-500', embeddable: false },
            { name: 'Arts & Culture', url: 'https://artsandculture.google.com', icon: 'arts', color: 'text-red-400', embeddable: false },
            { name: 'Google Travel', url: 'https://www.google.com/travel', icon: 'travel', color: 'text-sky-400', embeddable: false },
            { name: 'Google Books', url: 'https://books.google.com', icon: 'books', color: 'text-orange-500', embeddable: false },
            { name: 'Chrome Web Store', url: 'https://chromewebstore.google.com', icon: 'chromestore', color: 'text-cyan-400', embeddable: false },
            { name: 'Password Manager', url: 'https://passwords.google.com', icon: 'passwords', color: 'text-yellow-500', embeddable: false },
            { name: 'Google Analytics', url: 'https://analytics.google.com', icon: 'analytics', color: 'text-orange-400', embeddable: false },
            { name: 'Blogger', url: 'https://www.blogger.com', icon: 'blogger', color: 'text-orange-600', embeddable: false },
            { name: 'YouTube Music', url: 'https://music.youtube.com', icon: 'ytmusic', color: 'text-red-600', embeddable: false },
            { name: 'Google Wallet', url: 'https://wallet.google', icon: 'wallet', color: 'text-zinc-300', embeddable: false },
            { name: 'Google Tasks', url: 'https://assistant.google.com/tasks', icon: 'tasks', color: 'text-blue-600', embeddable: false },
            { name: 'Business Profile', url: 'https://business.google.com', icon: 'business', color: 'text-orange-400', embeddable: false },
            { name: 'Google Contacts', url: 'https://contacts.google.com', icon: 'contacts', color: 'text-blue-400', embeddable: false },
            { name: 'Google Lens', url: 'https://lens.google', icon: 'lens', color: 'text-teal-400', embeddable: false },
            { name: 'NotebookLM', url: 'https://notebooklm.google.com', icon: 'notebook', color: 'text-cyan-400', embeddable: false },
            { name: 'Google Ads', url: 'https://ads.google.com', icon: 'ads', color: 'text-amber-500', embeddable: false },
            { name: 'Google Docs', url: 'https://docs.google.com', icon: 'docs', color: 'text-blue-400', embeddable: false },
            { name: 'Google Sheets', url: 'https://sheets.google.com', icon: 'sheets', color: 'text-green-400', embeddable: false },
            { name: 'Google Slides', url: 'https://slides.google.com', icon: 'slides', color: 'text-yellow-600', embeddable: false },
            { name: 'Google Photos', url: 'https://photos.google.com', icon: 'photos', color: 'text-indigo-400', embeddable: false },
            { name: 'Google Keep', url: 'https://keep.google.com', icon: 'keep', color: 'text-amber-400', embeddable: false },
            { name: 'Google Drive', url: 'https://drive.google.com', icon: 'drive', color: 'text-yellow-500', embeddable: false },
            { name: 'Gmail', url: 'https://mail.google.com', icon: 'gmail', color: 'text-red-400', embeddable: false },
            { name: 'Google Calendar', url: 'https://calendar.google.com', icon: 'calendar', color: 'text-blue-400', embeddable: false }
        ];

        let selectedIndex = 0;
        let progressInterval;

        function renderNavigation() {
            const container = document.getElementById('navigationContainer');
            container.innerHTML = '';

            googleServices.forEach((service, index) => {
                const isSelected = index === selectedIndex;
                const btnContainer = document.createElement('div');
                btnContainer.className = 'px-3';

                const button = document.createElement('button');
                button.onclick = () => handleServiceSelect(index);
                button.className = `w-full flex items-center gap-4 px-4 py-2.5 rounded-xl transition-all duration-200 group ${
                    isSelected 
                    ? 'bg-blue-600/10 text-blue-400 font-semibold border-l-4 border-blue-500 pl-3' 
                    : 'text-zinc-400 hover:bg-white/5 hover:text-zinc-100'
                }`;

                button.innerHTML = `
                    <div class="transition-colors duration-200 ${isSelected ? 'text-blue-500' : 'text-zinc-400 group-hover:text-zinc-200'}">
                        ${svgIcons[service.icon] || svgIcons.dashboard}
                    </div>
                    <span class="text-[14px] tracking-wide text-left">${service.name}</span>
                `;
                btnContainer.appendChild(button);
                container.appendChild(btnContainer);
            });
        }

        function buildDashboardGrid() {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '';

            googleServices.forEach((service, index) => {
                if (index === 0) return;

                const card = document.createElement('div');
                card.className = 'bg-cardBg border border-white/5 p-5 rounded-2xl flex flex-col items-center justify-center gap-3 cursor-pointer hover:border-blue-500/50 hover:bg-white/[0.02] transition-all duration-300 group shadow-lg';
                card.onclick = () => handleServiceSelect(index);

                card.innerHTML = `
                    <div class="p-3 bg-white/5 rounded-xl group-hover:scale-110 transition-transform duration-300 ${service.color}">
                        ${svgIcons[service.icon] || svgIcons.dashboard}
                    </div>
                    <span class="text-xs font-medium tracking-wide text-zinc-200 text-center">${service.name}</span>
                `;
                grid.appendChild(card);
            });
        }

        function handleServiceSelect(index) {
            const service = googleServices[index];

            if (!service.embeddable) {
                window.open(service.url, '_blank');
                return; 
            }

            selectedIndex = index;
            renderNavigation();

            const iframe = document.getElementById('workspaceFrame');
            const iframeWrapper = document.getElementById('iframeWrapper');
            const welcomeDashboard = document.getElementById('welcomeDashboard');
            const progressBar = document.getElementById('topProgressBar');
            
            document.getElementById('mobileHeaderTitle').innerText = service.name;

            clearInterval(progressInterval);
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            
            let currentWidth = 0;
            setTimeout(() => {
                progressBar.style.transition = 'width 0.4s ease-out';
                currentWidth = 20;
                progressBar.style.width = `${currentWidth}%`;

                progressInterval = setInterval(() => {
                    if (currentWidth < 85) {
                        currentWidth += 15;
                        progressBar.style.width = `${currentWidth}%`;
                    }
                }, 100);
            }, 50);

            if (service.url === 'home') {
                iframeWrapper.classList.add('hidden');
                welcomeDashboard.classList.remove('hidden');
                iframe.src = "about:blank";
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                setTimeout(() => progressBar.style.width = '0%', 300);
            } else {
                welcomeDashboard.classList.add('hidden');
                iframeWrapper.classList.remove('hidden');
                iframe.src = service.url;
            }

            const sidebarPanel = document.getElementById('sidebarPanel');
            if (!sidebarPanel.classList.contains('-translate-x-full')) {
                toggleMobileSidebar();
            }
        }

        function resetToHomeState() {
            selectedIndex = 0;
            renderNavigation();
            document.getElementById('mobileHeaderTitle').innerText = googleServices[0].name;
            document.getElementById('iframeWrapper').classList.add('hidden');
            document.getElementById('welcomeDashboard').classList.remove('hidden');
            document.getElementById('workspaceFrame').src = "about:blank";
        }

        document.getElementById('workspaceFrame').onload = function() {
            clearInterval(progressInterval);
            const progressBar = document.getElementById('topProgressBar');
            if (this.src !== "about:blank") {
                progressBar.style.width = '100%';
                setTimeout(() => {
                    progressBar.style.width = '0%';
                    progressBar.style.transition = 'none';
                }, 300);
            }
        };

        function toggleMobileSidebar() {
            const panel = document.getElementById('sidebarPanel');
            const overlay = document.getElementById('sidebarOverlay');
            panel.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        window.onload = function() {
            resetToHomeState();
            buildDashboardGrid();
        };
    </script>
</body>
</html>
